name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "debugger/backend/**"

jobs:
  test:
    name: Full test suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: debugger/backend

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify JWT_SECRET_KEY
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: |
          if [ -z "$JWT_SECRET_KEY" ]; then
            echo "ERROR: JWT_SECRET_KEY secret is not set. Aborting."
            exit 1
          fi

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run cognitive engine tests
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: pytest tests/test_cognitive_engine.py -v --tb=short

      - name: Run auth and security tests
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: pytest tests/test_auth.py -v --tb=short

      - name: Run full test suite
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: pytest tests/ -v --tb=short

  deploy:
    name: Deploy to Railway
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: debugger/backend

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway up --service backend
