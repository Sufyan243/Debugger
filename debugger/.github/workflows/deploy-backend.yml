name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

defaults:
  run:
    working-directory: backend

jobs:
  # ---------------------------------------------------------------------------
  # Full test suite — unit, auth, negative-path, performance, resilience
  # ---------------------------------------------------------------------------
  test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Verify JWT_SECRET_KEY
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: |
          if [ -z "$JWT_SECRET_KEY" ]; then
            echo "ERROR: JWT_SECRET_KEY is not set. Aborting CI."
            exit 1
          fi

      - name: Run all tests (unit + negative-path + performance)
        run: |
          pytest tests/ \
            --tb=short \
            -q \
            --timeout=60 \
            -x
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          REDIS_URL: redis://localhost:6379
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          FRONTEND_URL: http://localhost:5173

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/.pytest_cache/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Deploy — only runs when all tests pass
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
