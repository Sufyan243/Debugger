name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"

defaults:
  run:
    working-directory: frontend

jobs:
  # ---------------------------------------------------------------------------
  # Unit + performance tests (vitest)
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit & Performance Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (includes perf thresholds)
        run: npm test

  # ---------------------------------------------------------------------------
  # Browser matrix E2E (Playwright) — Chrome, Edge, Firefox, Mobile Chrome
  # Runs against the production build served by a local preview server.
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E — ${{ matrix.project }}
    runs-on: ubuntu-latest
    needs: unit-tests
    strategy:
      fail-fast: true
      matrix:
        project: [chromium, firefox, mobile-chrome]
        # Edge requires the msedge channel which is only available on Windows runners.
        # It is tested in the separate edge job below.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Serve build and run E2E
        run: |
          npx serve -s dist -l 5173 &
          sleep 3
          BASE_URL=http://localhost:5173 \
          VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }} \
          npx playwright test --project=${{ matrix.project }} --reporter=github
        env:
          CI: true

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.project }}-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

  # Edge — Windows runner required for msedge channel
  e2e-edge:
    name: E2E — edge
    runs-on: windows-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Edge
        run: npx playwright install --with-deps msedge

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Serve build and run E2E
        shell: pwsh
        run: |
          Start-Process npx -ArgumentList "serve -s dist -l 5173" -NoNewWindow
          Start-Sleep 5
          $env:BASE_URL = "http://localhost:5173"
          $env:VITE_API_BASE_URL = "${{ secrets.VITE_API_BASE_URL }}"
          $env:CI = "true"
          npx playwright test --project=edge --reporter=github

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-edge-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Deploy — only runs when ALL test jobs pass
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e, e2e-edge]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
